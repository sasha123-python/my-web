<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>

    <style>
        body {
            background-color: #1e1e1e;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: bold;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background-color: #2b2b2b;
            color: #fff;
            border-radius: 6px;
            overflow: hidden;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #444;
            font-size: 16px;
        }

        th {
            background-color: #333;
        }

        tr:hover {
            background-color: #3a3a3a;
        }

        /* Поля фільтра */
        form {
            margin-bottom: 25px;
        }

        input[type="text"] {
            padding: 8px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            width: 160px;
        }

        /* Кнопка "Filtrar" */
        button {
            padding: 9px 16px;
            background-color: #4CAF50;
            border: none;
            color: white;
            font-size: 15px;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Червона кнопка Eliminar */
        .delete-btn {
            background-color: #d9534f;
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .delete-btn:hover {
            background-color: #c9302c;
        }
    </style>

    <!-- Підключення календаря (Flatpickr) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
</head>

<body>

<h2>Lista de Registros</h2>

<!-- Форма фільтрації -->
<form method="get" action="/admin">
    <label>Desde:</label>
    <input type="text" id="from_date" name="from_date" placeholder="Seleccionar fecha">

    <label>Hasta:</label>
    <input type="text" id="to_date" name="to_date" placeholder="Seleccionar fecha">

    <button type="submit">Filtrar</button>
</form>

<!-- Таблиця результатів -->
<table>
    <tr>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Fecha</th>
        <th>Acción</th>
    </tr>

    {% for c in clients %}
    <tr>
        <td>{{ c[1] }}</td>
        <td>{{ c[2] }}</td>
        <td>{{ c[3] }}</td>

        <td>
            <form method="post" action="/admin/delete/{{ c[0] }}">
                <button class="delete-btn" type="submit">Eliminar</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

<!-- Підключення JS календаря -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

<script>
    flatpickr("#from_date", {
        dateFormat: "Y-m-d",
        locale: "es"
    });

    flatpickr("#to_date", {
        dateFormat: "Y-m-d",
        locale: "es"
    });
</script>

</body>
</html>
