<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso del Administrador</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 80px;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 28px;
        }

        form {
            display: inline-block;
            padding: 20px;
            background-color: #2a2a2a;
            border-radius: 8px;
            border: 1px solid #3e3e3e;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 180px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #333;
            color: white;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #4CAF50;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

<h2>Acceso del Administrador</h2>

<form method="post" action="/login">
    <input type="text" name="username" placeholder="Usuario">
    <input type="password" name="password" placeholder="Contraseña">
    <button type="submit">Entrar</button>
</form>

</body>
</html>
